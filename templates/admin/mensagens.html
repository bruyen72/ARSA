<?php
$active = 'mensagens';
include __DIR__ . '/partials/header.html';
?>

<div class="admin-card">
  <div class="admin-card-head">
    <div>
      <h2>Mensagens recebidas</h2>
      <p class="card-desc">Pedidos enviados pelo formulário de Contato.</p>
    </div>
  </div>

  <?php if (empty($mensagens)): ?>
  <p class="card-desc">Nenhuma mensagem recebida ainda.</p>
  <?php else: ?>
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Data</th>
          <th>Contato</th>
          <th>Interesse</th>
          <th>Mensagem</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <?php foreach ($mensagens as $msg): ?>
        <tr class="<?= empty($msg['lida']) ? 'is-unread' : '' ?>">
          <td class="msg-meta">
            <?php
              $data = $msg['created_at'] ?? '';
              echo $data !== '' ? h(date('d/m/Y H:i', strtotime($data))) : '';
            ?>
          </td>
          <td>
            <strong><?= h($msg['nome'] ?? '') ?></strong>
            <?php if (!empty($msg['empresa'])): ?><br><span class="msg-meta"><?= h($msg['empresa']) ?></span><?php endif; ?>
            <?php if (!empty($msg['telefone'])): ?><br><span class="msg-meta">Tel: <?= h($msg['telefone']) ?></span><?php endif; ?>
            <?php if (!empty($msg['email'])): ?><br><span class="msg-meta"><?= h($msg['email']) ?></span><?php endif; ?>
          </td>
          <td><?= h($msg['interesse'] ?? '') ?></td>
          <td style="max-width: 320px; white-space: normal;"><?= nl2br(h($msg['mensagem'] ?? '')) ?></td>
          <td>
            <?php if (empty($msg['lida'])): ?>
            <span class="badge-pill badge-unread">Não lida</span>
            <?php else: ?>
            <span class="badge-pill badge-read">Lida</span>
            <?php endif; ?>
          </td>
          <td>
            <div class="row-actions">
              <form method="post" action="<?= url_for('/admin/mensagens/marcar/' . $msg['id']) ?>">
                <?= csrf_field() ?>
                <button class="btn btn-ghost btn-sm" type="submit"><?= empty($msg['lida']) ? 'Marcar como lida' : 'Marcar como não lida' ?></button>
              </form>
              <form method="post" action="<?= url_for('/admin/mensagens/excluir/' . $msg['id']) ?>" onsubmit="return confirm('Excluir esta mensagem?');">
                <?= csrf_field() ?>
                <button class="btn btn-danger btn-sm" type="submit">Excluir</button>
              </form>
            </div>
          </td>
        </tr>
        <?php endforeach; ?>
      </tbody>
    </table>
  </div>
  <?php endif; ?>
</div>

<?php include __DIR__ . '/partials/footer.html'; ?>
